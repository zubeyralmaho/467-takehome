question: q3
task: summarization

dataset:
  name: cnn_dailymail
  version: 3.0.0
  article_column: article
  summary_column: highlights
  id_column: id
  limit_train_samples: 10000
  limit_validation_samples: 1000
  limit_test_samples: 1000

preprocess:
  max_article_words: 900
  min_sentence_words: 4

models:
  textrank:
    enabled: true
    similarity_method: tfidf
    damping: 0.85
    num_sentences: 3
    max_sentences: 40

  bart:
    enabled: false
    model_name: sshleifer/distilbart-cnn-12-6
    batch_size: 2
    max_input_length: 1024
    max_output_length: 142
    min_output_length: 56
    num_beams: 4
    length_penalty: 2.0
    no_repeat_ngram_size: 3
    early_stopping: true

  lead3:
    enabled: false
    num_sentences: 3

evaluation:
  metrics:
    - rouge1
    - rouge2
    - rougeL
    - bleu
    - meteor
  num_qualitative_examples: 3