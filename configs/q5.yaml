question: q5
task: language_modeling

dataset:
  name: wikitext
  version: wikitext-2-raw-v1
  text_column: text
  limit_train_samples: 5000
  limit_validation_samples: 1000
  limit_test_samples: 1000

preprocess:
  lowercase: true
  min_tokens_per_line: 2

model:
  type: ngram
  n: 3
  smoothing: add_k
  alpha: 0.1
  min_token_frequency: 2
  max_vocab_size: 15000
  embedding_dim: 128
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0
  max_epochs: 8
  early_stopping_patience: 2
  max_seq_length: 35
  tie_weights: true
  gradient_clip: 1.0
  num_workers: 0
  model_name: distilgpt2
  max_input_length: 256
  eval_batch_size: 8
  top_k: 50

generation:
  max_length: 25
  temperature: 1.0
  num_samples: 3
  seed_texts:
    - the
    - in the
    - he was

evaluation:
  metrics:
    - perplexity