question: q5
task: language_modeling

dataset:
  name: wikitext
  version: wikitext-2-raw-v1
  text_column: text
  limit_train_samples: 5000
  limit_validation_samples: 1000
  limit_test_samples: 1000

preprocess:
  lowercase: true
  min_tokens_per_line: 2

model:
  type: ngram
  n: 3
  smoothing: add_k
  alpha: 0.1
  min_token_frequency: 2

generation:
  max_length: 25
  temperature: 1.0
  num_samples: 3
  seed_texts:
    - the
    - in the
    - he was

evaluation:
  metrics:
    - perplexity