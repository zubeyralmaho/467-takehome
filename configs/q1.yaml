question: q1
task: classification

dataset:
  name: imdb
  text_column: text
  label_column: label
  val_split_ratio: 0.2
  limit_train_samples: null
  limit_test_samples: null

preprocess:
  lowercase: true
  remove_html: true
  remove_special: true
  remove_stopwords: false
  max_length: 256

models:
  tfidf_lr:
    enabled: true
    classifier: lr
    max_features: 50000
    ngram_range: [1, 2]
    C: 1.0

  tfidf_svm:
    enabled: true
    classifier: svm
    max_features: 50000
    ngram_range: [1, 2]
    C: 1.0

  bilstm:
    enabled: false
    embedding_dim: 128
    hidden_dim: 128
    num_layers: 1
    dropout: 0.3
    batch_size: 64
    learning_rate: 0.001
    weight_decay: 0.0
    max_epochs: 6
    early_stopping_patience: 2
    max_vocab_size: 30000
    min_frequency: 2
    max_seq_length: 256
    num_workers: 0
    monitor_metric: macro_f1

evaluation:
  metrics: [accuracy, macro_f1]
  num_misclassified_examples: 5
