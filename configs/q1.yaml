question: q1
task: classification

dataset:
  name: imdb
  text_column: text
  label_column: label
  val_split_ratio: 0.2
  limit_train_samples: null
  limit_test_samples: null

preprocess:
  lowercase: true
  remove_html: true
  remove_special: true
  remove_stopwords: false
  max_length: 256

models:
  tfidf_lr:
    enabled: true
    classifier: lr
    max_features: 50000
    ngram_range: [1, 2]
    C: 1.0

  tfidf_svm:
    enabled: true
    classifier: svm
    max_features: 50000
    ngram_range: [1, 2]
    C: 1.0

evaluation:
  metrics: [accuracy, macro_f1]
  num_misclassified_examples: 5
