question: q4
task: translation

dataset:
  name: bentrevett/multi30k
  src_lang: en
  tgt_lang: de
  limit_train_samples: 2000
  limit_validation_samples: 200
  limit_test_samples: 200

preprocess:
  lowercase_source: false
  lowercase_target: false

models:
  seq2seq:
    enabled: false
    embedding_dim: 128
    hidden_dim: 128
    num_layers: 1
    dropout: 0.2
    batch_size: 32
    learning_rate: 0.001
    weight_decay: 0.0
    max_epochs: 8
    early_stopping_patience: 2
    teacher_forcing_ratio: 0.5
    max_vocab_size: 8000
    min_token_frequency: 2
    max_output_length: 32
    gradient_clip: 1.0
    num_workers: 0

  transformer:
    enabled: true
    model_name: Helsinki-NLP/opus-mt-en-de
    batch_size: 8
    max_input_length: 96
    max_output_length: 96
    num_beams: 4
    length_penalty: 1.0
    early_stopping: true

evaluation:
  metrics:
    - bleu
    - chrf
  num_qualitative_examples: 3